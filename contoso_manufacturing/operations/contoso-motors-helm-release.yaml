apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: contoso-motors
  namespace: default
spec:
  interval: 1m
  releaseName: contoso-motors
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: contoso-motors
      version: '0.1.0'
      sourceRef:
        kind: HelmRepository
        name: contoso-motors